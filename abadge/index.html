<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger PWA II</title>
    <link rel="manifest" crossorigin="use-credentials" href="./manifest.json">
    <meta name="theme-color" content="#0084ff">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* In-app unread counter */
        #unreadCounter {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #ff3b30;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            min-width: 22px;
            text-align: center;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="unreadCounter">0</div>

    <div class="chat-container">
        <h2>Messenger PWA II</h2>
        <div id="status" style="font-size:13px; margin-bottom:10px; color: #444;"></div>

        <div class="input-row">
            <input type="text" id="currentUser" placeholder="Your name" required>
            <input type="text" id="chatPartner" placeholder="Chat with" required>
            <button onclick="startChat()">Start Chat</button>
        </div>

        <div id="messages" style="display: none;"></div>

        <form id="chatForm" style="display: none;">
            <input type="text" id="messageInput" placeholder="Type a message..." required>
            <button type="submit">Send</button>
        </form>
    </div>

    <audio id="notifySound" preload="auto">
        <source src="./notification.mp3" type="audio/mpeg">
    

    <script>
        // --------------------------
        // 👉 UPDATE THIS WITH YOUR BACKEND URL
        //const BACKEND_URL = "https://yourname.epizy.com/messenger-backend/";
        //const BACKEND_URL = "https://jmessenger.rf.gd/"; // NO trailing slash issue
        const BACKEND_URL = ""; // NO trailing slash issue
        // --------------------------

        let swReg, currentUser = '', chatPartner = '', lastTime = 0;
        const notifySound = document.getElementById('notifySound');
        const status = document.getElementById('status');
        const unreadCounterEl = document.getElementById('unreadCounter');

        window.addEventListener('load', async () => {
            // Restore saved badge count (works offline)
            const savedUnread = parseInt(localStorage.getItem('lastUnread') || '0');
            if (savedUnread > 0) updateBadge(savedUnread);

            // Register Service Worker
            if ('serviceWorker' in navigator) {
                try {
                    swReg = await navigator.serviceWorker.register('./sw.js');
                    status.textContent = "✅ Service Worker ready";
                } catch (err) {
                    status.textContent = "❌ SW Error: " + err.message;
                    console.error(err);
                }
            } else {
                status.textContent = "⚠️ Service Worker not supported";
            }

            // Check Badge API support
            if (!('setAppBadge' in navigator)) {
                status.innerHTML += "<br>ℹ️ System badge API not available — using fallback";
            }

            // Request notification permission
            if ('Notification' in window) {
                const perm = await Notification.requestPermission();
                if (perm === 'granted') {
                    status.innerHTML += "<br>✅ Notifications allowed";
                } else {
                    status.innerHTML += "<br>⚠️ Notifications blocked — badges won't work";
                }
            }
        });

        // --------------------------
        // 🔧 FIXED BADGE FUNCTION
        // --------------------------
        function updateBadge(count) {
            count = Number(count) || 0;
            console.log("Updating badge to:", count);

            // Save to local storage for offline use
            localStorage.setItem('lastUnread', count);

            // 1. Always show in-app counter
            if (count > 0) {
                unreadCounterEl.textContent = count;
                unreadCounterEl.style.display = 'inline-block';
            } else {
                unreadCounterEl.style.display = 'none';
            }

            // 2. System badge for Windows / macOS / iOS
            if ('setAppBadge' in navigator) {
                navigator.setAppBadge(count)
                    .then(() => console.log("✅ System badge set:", count))
                    .catch(err => console.warn("⚠️ Badge API failed:", err));
            }

            // 3. ANDROID FIX — only way to get home screen badge
            if (/Android/.test(navigator.userAgent) && Notification.permission === 'granted') {
                if (count > 0) {
                    new Notification("Unread Messages", {
                        body: `You have ${count} unread message(s)`,
                        icon: "./icons/icon-192x192.png",
                        tag: "unread-badge", // same tag = replace
                        renotify: false,
                        silent: true,
                        requireInteraction: false
                    });
                } else {
                    // Clear badge
                    if (swReg?.active) {
                        swReg.active.getNotifications({ tag: "unread-badge" })
                            .then(notifs => notifs.forEach(n => n.close()));
                    }
                }
            }
        }

        function playSound() {
            notifySound.currentTime = 0;
            notifySound.play().catch(() => {});
        }

        function showNotify(title, body) {
            if (swReg?.active && Notification.permission === 'granted') {
                swReg.active.postMessage({
                    type: 'SHOW_NOTIFICATION',
                    title: title,
                    body: body,
                    url: window.location.origin + '/index.html'
                });
            }
        }

        function startChat() {
            currentUser = document.getElementById('currentUser').value.trim();
            chatPartner = document.getElementById('chatPartner').value.trim();
            if (!currentUser || !chatPartner) return;

            document.getElementById('messages').style.display = 'block';
            document.getElementById('chatForm').style.display = 'block';
            loadMessages();
            setInterval(checkUnread, 5000); // check every 5 seconds
        }

        // --------------------------
        // 🛡️ FETCH WITH ERROR HANDLING
        // --------------------------
        async function getUnreadCount() {
            try {
                const res = await fetch(`${BACKEND_URL}get_unread_count.php?user=${encodeURIComponent(currentUser)}`);
                if (!res.ok) throw new Error("Server error: " + res.status);
                const text = await res.text();
                try {
                    return JSON.parse(text);
                } catch {
                    console.error("❌ Expected JSON, got:", text);
                    return { unread: 0 };
                }
            } catch (err) {
                console.error("❌ Failed to get unread count:", err);
                return { unread: 0 };
            }
        }

        async function loadMessages() {
            try {
                const res = await fetch(`${BACKEND_URL}get_messages.php?user=${encodeURIComponent(currentUser)}&chat_with=${encodeURIComponent(chatPartner)}`);
                if (!res.ok) throw new Error("Server error: " + res.status);
                const text = await res.text();
                const msgs = JSON.parse(text);
                const box = document.getElementById('messages');

                if (msgs.length > 0) {
                    const latest = msgs[msgs.length - 1];
                    const time = new Date(latest.created_at).getTime();
                    if (time > lastTime && latest.sender !== currentUser) {
                        playSound();
                        const countData = await getUnreadCount();
                        updateBadge(countData.unread);
                        showNotify(`New from ${latest.sender}`, latest.message);
                    }
                    lastTime = time;
                }

                box.innerHTML = msgs.map(m => `
                    <div class="msg ${m.sender === currentUser ? 'out' : 'in'}">
                        <strong>${m.sender}</strong> [${m.created_at.substr(11,5)}]<br>${m.message}
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
                updateBadge(0); // clear when viewed
            } catch (err) {
                console.error("❌ Load messages failed:", err);
                document.getElementById('messages').innerHTML = `<p style="color:red;">Error loading messages. Check your internet or backend.</p>`;
            }
        }

        async function checkUnread() {
            if (!currentUser) return;
            const data = await getUnreadCount();
            updateBadge(data.unread);
        }

        document.getElementById('chatForm').addEventListener('submit', async e => {
            e.preventDefault();
            const text = document.getElementById('messageInput').value.trim();
            if (!text) return;

            try {
                await fetch(`${BACKEND_URL}send_message.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: currentUser, receiver: chatPartner, text: text })
                });
                document.getElementById('messageInput').value = '';
                loadMessages();
            } catch (err) {
                console.error("❌ Send failed:", err);
                alert("Failed to send message. Check your connection.");
            }
        });
    </script>
</body>
</html>
